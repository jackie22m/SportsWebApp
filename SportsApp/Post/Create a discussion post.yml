info:
  name: Create a discussion post
  type: http
  seq: 3

http:
  method: POST
  url: http://localhost:9926/api/posts
  body:
    type: json
    data: |
      {
        "type": "Discussion",
        "text": "What time works best for everyone?",
        "mediaUrl": null,
        "sportsTag": "Volleyball",
        "topic": "Scheduling",
        "visibility": "Public"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

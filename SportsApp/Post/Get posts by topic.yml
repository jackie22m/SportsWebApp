info:
  name: Get posts by topic
  type: http
  seq: 8

http:
  method: GET
  url: http://localhost:9926/api/posts?topic=discussion
  params:
    - name: topic
      value: discussion
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
